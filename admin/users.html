<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Users | Newdich Store</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Custom Admin CSS -->
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="admin-wrapper">
        <!-- Sidebar -->
        <aside class="admin-sidebar">
            <div class="sidebar-header">
                <h2>Newdich Admin</h2>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="index.html"><i class="fas fa-dashboard"></i> Dashboard</a></li>
                    <li><a href="products.html"><i class="fas fa-box"></i> Products</a></li>
                    <li><a href="categories.html"><i class="fas fa-tags"></i> Categories</a></li>
                    <li><a href="inventory.html"><i class="fas fa-warehouse"></i> Inventory</a></li>
                    <li><a href="orders.html"><i class="fas fa-shopping-cart"></i> Orders</a></li>
                    <li><a href="users.html" class="active"><i class="fas fa-users"></i> Users</a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <button id="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="admin-main">
            <header class="admin-header">
                <div class="header-title">
                    <h1>Users Management</h1>
                </div>
                <div class="header-user">
                    <span id="admin-name">Admin</span>
                </div>
            </header>

            <div class="admin-content">
                <div class="filters">
                    <div class="filter-group">
                        <label for="search-user">Search</label>
                        <input type="text" id="search-user" placeholder="Name or email">
                    </div>
                    <div class="filter-actions">
                        <button id="apply-search" class="btn-primary">Search</button>
                        <button id="reset-search" class="btn-secondary">Reset</button>
                    </div>
                </div>

                <div id="users-container">
                    <div class="loading">Loading users...</div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal for Editing User -->
    <div id="user-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Edit User</h2>
            <form id="user-form">
                <div class="form-group">
                    <label for="user-name">Name</label>
                    <input type="text" id="user-name" disabled>
                </div>
                <div class="form-group">
                    <label for="user-email">Email</label>
                    <input type="email" id="user-email" disabled>
                </div>
                <div class="form-group">
                    <label for="user-role">Role</label>
                    <select id="user-role">
                        <option value="user">User</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="user-status">Status</label>
                    <select id="user-status">
                        <option value="active">Active</option>
                        <option value="inactive">Inactive</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-primary">Save Changes</button>
                    <button type="button" id="cancel-modal" class="btn-secondary">Cancel</button>
                </div>
            </form>
            <div id="user-message" class="profile-message" style="display: none;"></div>
        </div>
    </div>

    <script type="module" src="js/users-admin.js"></script>
    <script type="module" src="js/admin.js"></script>
</body>
</html>
