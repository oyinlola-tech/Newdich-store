<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Reset Password - Newdich Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin-auth-body">
    <div class="admin-auth-wrapper">
        <div class="admin-auth-card">
            <div class="admin-auth-header">
                <h2>Set New Password</h2>
                <p>Choose a strong password after verifying your code.</p>
            </div>
            <form id="admin-reset-form">
                <div class="form-group">
                    <label for="admin-password">New Password</label>
                    <input type="password" id="admin-password" required>
                </div>
                <div class="form-group">
                    <label for="admin-confirm-password">Confirm Password</label>
                    <input type="password" id="admin-confirm-password" required>
                </div>
                <button type="submit" class="btn-primary btn-block">Update Password</button>
                <div id="admin-reset-message" class="success-message" style="display:none;"></div>
                <div id="admin-reset-error" class="error-message" style="display:none;"></div>
            </form>
            <div class="auth-footer">
                <p><a href="login.html">Back to login</a></p>
            </div>
        </div>
    </div>

    <script type="module" src="js/admin-reset-password.js"></script>
</body>
</html>
