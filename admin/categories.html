<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Categories | Newdich Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="admin-wrapper">
        <aside class="admin-sidebar">
            <div class="sidebar-header">
                <h2>Newdich Admin</h2>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="index.html"><i class="fas fa-dashboard"></i> Dashboard</a></li>
                    <li><a href="products.html"><i class="fas fa-box"></i> Products</a></li>
                    <li><a href="categories.html" class="active"><i class="fas fa-tags"></i> Categories</a></li>
                    <li><a href="inventory.html"><i class="fas fa-warehouse"></i> Inventory</a></li>
                    <li><a href="orders.html"><i class="fas fa-shopping-cart"></i> Orders</a></li>
                    <li><a href="users.html"><i class="fas fa-users"></i> Users</a></li>
                    <li><a href="settings.html"><i class="fas fa-gear"></i> Settings</a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <button id="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </aside>

        <main class="admin-main">
            <header class="admin-header">
                <div class="header-title">
                    <h1>Categories</h1>
                </div>
                <div class="header-user">
                    <span id="admin-name">Admin</span>
                </div>
            </header>

            <div class="admin-content">
                <div class="products-actions">
                    <button id="add-category-btn" class="btn-primary"><i class="fas fa-plus"></i> Add Category</button>
                </div>

                <div id="categories-container">
                    <div class="loading">Loading categories...</div>
                </div>
            </div>
        </main>
    </div>

    <div id="category-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="category-modal-title">Add Category</h2>
            <form id="category-form">
                <div class="form-group">
                    <label for="category-name">Name</label>
                    <input type="text" id="category-name" required>
                </div>
                <div class="form-group">
                    <label for="category-slug">Slug</label>
                    <input type="text" id="category-slug" placeholder="e.g. sneakers">
                </div>
                <div class="form-group">
                    <label for="category-description">Description</label>
                    <textarea id="category-description" rows="4"></textarea>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-primary">Save</button>
                    <button type="button" id="cancel-category" class="btn-secondary">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="js/categories-admin.js"></script>
    <script type="module" src="js/admin.js"></script>
</body>
</html>
