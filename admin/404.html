<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com data:; img-src 'self' data: https://via.placeholder.com; connect-src 'self' http://localhost:3000; base-uri 'self'; form-action 'self'; frame-ancestors 'none'">
    <meta name="referrer" content="no-referrer">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Newdich Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body class="not-found-body">
    <div class="not-found-wrapper">
        <div class="not-found-card">
            <div class="not-found-code">404</div>
            <h1 class="not-found-title">This page went missing</h1>
            <p class="not-found-text">The page you are looking for does not exist or has been moved. Let's get you back to the dashboard or inventory.</p>
            <div class="not-found-actions">
                <a href="/admin" class="btn-primary"><i class="fas fa-home"></i> Back to Dashboard</a>
                <a href="/admin/products" class="btn-secondary"><i class="fas fa-box"></i> View Products</a>
            </div>
        </div>
    </div>
</body>
</html>
