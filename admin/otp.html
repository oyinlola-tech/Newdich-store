<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Code Verification - Newdich Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin-auth-body">
    <div class="admin-auth-wrapper">
        <div class="admin-auth-card">
            <div class="admin-auth-header">
                <h2>Verify Code</h2>
                <p>Enter the 6-digit verification code sent to your email.</p>
            </div>
            <form id="admin-otp-form">
                <div class="form-group">
                    <label for="admin-otp-code">Verification Code</label>
                    <input type="text" id="admin-otp-code" maxlength="6" inputmode="numeric" required>
                </div>
                <br>
                <button type="submit" class="btn-primary btn-block">Verify</button>
                <div id="admin-otp-message" class="success-message" style="display:none;"></div>
                <div id="admin-otp-error" class="error-message" style="display:none;"></div>
            </form>
            <div class="auth-footer">
                <p><button id="admin-resend-otp" class="btn-secondary">Resend Code</button></p>
            </div>
            <div class="auth-footer">
                <p><a href="/admin/login">Back to login</a></p>
            </div>
        </div>
    </div>

    <script type="module" src="js/admin-otp.js"></script>
</body>
</html>
