<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Orders | Newdich Store</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Custom Admin CSS -->
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="admin-wrapper">
        <!-- Sidebar -->
        <aside class="admin-sidebar">
            <div class="sidebar-header">
                <h2>Newdich Admin</h2>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="index.html"><i class="fas fa-dashboard"></i> Dashboard</a></li>
                    <li><a href="products.html"><i class="fas fa-box"></i> Products</a></li>
                    <li><a href="categories.html"><i class="fas fa-tags"></i> Categories</a></li>
                    <li><a href="inventory.html"><i class="fas fa-warehouse"></i> Inventory</a></li>
                    <li><a href="orders.html" class="active"><i class="fas fa-shopping-cart"></i> Orders</a></li>
                    <li><a href="users.html"><i class="fas fa-users"></i> Users</a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <button id="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="admin-main">
            <header class="admin-header">
                <div class="header-title">
                    <h1>Orders Management</h1>
                </div>
                <div class="header-user">
                    <span id="admin-name">Admin</span>
                </div>
            </header>

            <div class="admin-content">
                <div class="filters">
                    <div class="filter-group">
                        <label for="status-filter">Status</label>
                        <select id="status-filter">
                            <option value="all">All Orders</option>
                            <option value="pending">Pending</option>
                            <option value="processing">Processing</option>
                            <option value="completed">Completed</option>
                            <option value="cancelled">Cancelled</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label for="search-filter">Search</label>
                        <input type="text" id="search-filter" placeholder="Order ID or Customer name">
                    </div>
                    <div class="filter-actions">
                        <button id="apply-filters" class="btn-primary">Apply Filters</button>
                        <button id="reset-filters" class="btn-secondary">Reset</button>
                    </div>
                </div>

                <div id="orders-container">
                    <div class="loading">Loading orders...</div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal for Order Details -->
    <div id="order-modal" class="modal" style="display: none;">
        <div class="modal-content modal-large">
            <span class="close">&times;</span>
            <h2>Order Details</h2>
            <div id="order-details-content">
                <div class="loading">Loading...</div>
            </div>
        </div>
    </div>

    <div id="orders-status-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close" id="orders-status-close">&times;</span>
            <h2>Confirm Status Change</h2>
            <p id="orders-status-text">Update status?</p>
            <div class="form-actions">
                <button id="orders-status-yes" class="btn-primary">Yes, Update</button>
                <button id="orders-status-no" class="btn-secondary">Cancel</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/orders-admin.js"></script>
    <script type="module" src="js/admin.js"></script>
</body>
</html>
