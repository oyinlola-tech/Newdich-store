<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Forgot Password - Newdich Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin-auth-body">
    <div class="admin-auth-wrapper">
        <div class="admin-auth-card">
            <div class="admin-auth-header">
                <h2>Admin Password Reset</h2>
                <p>Enter your admin email to receive a reset verification code.</p>
            </div>
            <form id="admin-forgot-form">
                <div class="form-group">
                    <label for="admin-email">Email</label>
                    <input type="email" id="admin-email" required>
                </div>
                <br>
                <button type="submit" class="btn-primary btn-block">Send Code</button>
                <div id="admin-forgot-message" class="success-message" style="display:none;"></div>
                <div id="admin-forgot-error" class="error-message" style="display:none;"></div>
            </form>
            <div class="auth-footer">
                <p><a href="/admin/login">Back to login</a></p>
            </div>
        </div>
    </div>

    <script type="module" src="js/admin-forgot-password.js"></script>
</body>
</html>
