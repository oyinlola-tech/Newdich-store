<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Order Detail - Newdich Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="admin-wrapper">
        <aside class="admin-sidebar">
            <div class="sidebar-header">
                <h2>Newdich Admin</h2>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="index.html"><i class="fas fa-dashboard"></i> Dashboard</a></li>
                    <li><a href="products.html"><i class="fas fa-box"></i> Products</a></li>
                    <li><a href="categories.html"><i class="fas fa-tags"></i> Categories</a></li>
                    <li><a href="inventory.html"><i class="fas fa-warehouse"></i> Inventory</a></li>
                    <li><a href="orders.html" class="active"><i class="fas fa-shopping-cart"></i> Orders</a></li>
                    <li><a href="users.html"><i class="fas fa-users"></i> Users</a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <button id="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </aside>

        <main class="admin-main">
            <header class="admin-header">
                <div class="header-title">
                    <h1>Order Detail</h1>
                </div>
                <div class="header-actions">
                    <select id="order-status-select" class="status-select">
                        <option value="pending">Pending</option>
                        <option value="processing">Processing</option>
                        <option value="completed">Completed</option>
                        <option value="cancelled">Cancelled</option>
                    </select>
                    <button id="update-status-btn" class="btn-primary">Update Status</button>
                </div>
            </header>

            <div class="admin-content">
                <div id="order-detail-container">
                    <div class="loading">Loading order...</div>
                </div>

                <div class="detail-grid">
                    <div class="detail-card">
                        <h3>Status History</h3>
                        <div id="status-history" class="history-list">
                            <div class="loading">Loading history...</div>
                        </div>
                    </div>
                    <div class="detail-card">
                        <h3>Admin Notes</h3>
                        <form id="order-note-form">
                            <textarea id="order-note" rows="4" placeholder="Add a note about this order..."></textarea>
                            <button type="submit" class="btn-secondary">Add Note</button>
                        </form>
                        <div id="order-notes" class="notes-list">
                            <div class="muted-text">No notes yet.</div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="status-confirm-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close" id="status-confirm-close">&times;</span>
            <h2>Confirm Status Update</h2>
            <p id="status-confirm-text">Are you sure you want to update this status?</p>
            <div class="form-actions">
                <button id="status-confirm-yes" class="btn-primary">Yes, Update</button>
                <button id="status-confirm-no" class="btn-secondary">Cancel</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/order-detail.js"></script>
    <script type="module" src="js/admin.js"></script>
</body>
</html>
