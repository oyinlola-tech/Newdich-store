<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Inventory | Newdich Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="admin-wrapper">
        <aside class="admin-sidebar">
            <div class="sidebar-header">
                <h2>Newdich Admin</h2>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="/admin"><i class="fas fa-dashboard"></i> Dashboard</a></li>
                    <li><a href="/admin/products"><i class="fas fa-box"></i> Products</a></li>
                    <li><a href="/admin/categories"><i class="fas fa-tags"></i> Categories</a></li>
                    <li><a href="/admin/inventory" class="active"><i class="fas fa-warehouse"></i> Inventory</a></li>
                    <li><a href="/admin/orders"><i class="fas fa-shopping-cart"></i> Orders</a></li>
                    <li><a href="/admin/returns"><i class="fas fa-undo"></i> Returns</a></li>
                    <li><a href="/admin/contact"><i class="fas fa-envelope"></i> Contact</a></li>
                    <li><a href="/admin/users"><i class="fas fa-users"></i> Users</a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <button id="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </aside>

        <main class="admin-main">
            <header class="admin-header">
                <div class="header-title">
                    <h1>Inventory</h1>
                </div>
                <div class="header-user">
                    <span id="admin-name">Admin</span>
                </div>
            </header>

            <div class="admin-content">
                <div class="filters">
                    <div class="filter-group">
                        <label for="inventory-search">Search</label>
                        <input type="text" id="inventory-search" placeholder="Product name or ID">
                    </div>
                    <div class="filter-group">
                        <label for="low-stock">Low Stock</label>
                        <select id="low-stock">
                            <option value="">All</option>
                            <option value="true">Low stock only</option>
                        </select>
                    </div>
                    <div class="filter-actions">
                        <button id="apply-inventory" class="btn-primary">Apply</button>
                        <button id="reset-inventory" class="btn-secondary">Reset</button>
                    </div>
                </div>

                <div id="inventory-container">
                    <div class="loading">Loading inventory...</div>
                </div>
            </div>
        </main>
    </div>

    <div id="inventory-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Update Inventory</h2>
            <form id="inventory-form">
                <div class="form-group">
                    <label for="inventory-stock">Stock Quantity</label>
                    <input type="number" id="inventory-stock" min="0" required>
                </div>
                <div class="form-group">
                    <label for="inventory-status">Status</label>
                    <select id="inventory-status">
                        <option value="in_stock">In Stock</option>
                        <option value="low_stock">Low Stock</option>
                        <option value="out_of_stock">Out of Stock</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-primary">Save</button>
                    <button type="button" id="cancel-inventory" class="btn-secondary">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="js/inventory-admin.js"></script>
    <script type="module" src="js/admin.js"></script>
</body>
</html>
