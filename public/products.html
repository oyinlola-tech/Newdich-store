<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newdich Store - Products</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <h1>Newdich Store</h1>
            </div>
            <button class="hamburger" aria-label="Menu">
                <i class="fas fa-bars"></i>
            </button>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="products.html">Products</a></li>
                    <li><a href="wishlist.html">Wishlist</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
            <div class="header-icons">
                <a href="wishlist.html" class="wishlist-icon">
                    <i class="fas fa-heart"></i>
                </a>
                <a href="cart.html" class="cart-icon">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count">0</span>
                </a>
                <a href="account.html" class="user-icon">
                    <i class="fas fa-user"></i>
                </a>
            </div>
        </div>
    </header>

    <main>
        <section class="products-section">
            <div class="container">
                <h2>All Products</h2>
                <div class="filters">
                    <div class="filter-group">
                        <label for="filter-category">Category</label>
                        <select id="filter-category">
                            <option value="all">All Categories</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label for="filter-search">Search</label>
                        <input type="text" id="filter-search" placeholder="Search products...">
                    </div>
                    <div class="filter-group">
                        <label for="filter-min-price">Min Price (₦)</label>
                        <input type="number" id="filter-min-price" placeholder="Min">
                    </div>
                    <div class="filter-group">
                        <label for="filter-max-price">Max Price (₦)</label>
                        <input type="number" id="filter-max-price" placeholder="Max">
                    </div>
                    <div class="filter-actions">
                        <button id="apply-filters" class="btn-filter">Apply Filters</button>
                        <button id="reset-filters" class="btn-reset">Reset</button>
                    </div>
                </div>

                <div id="products-grid" class="product-grid">
                    <div class="loading">Loading products...</div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Newdich Store. All rights reserved.</p>
            <p>Powered by Newdich Technology</p>
        </div>
    </footer>

    <script type="module" src="js/products.js"></script>
</body>
</html>
